version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq-sumativa
    ports:
      - "5672:5672"     # Puerto interno de comunicación con Spring Boot
      - "15672:15672"   # Puerto para la interfaz gráfica web
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    restart: unless-stopped