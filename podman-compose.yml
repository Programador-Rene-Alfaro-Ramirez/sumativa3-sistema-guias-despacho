version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq-guias
    ports:
      - "5672:5672"   # Puerto de colas
      - "15672:15672" # Puerto panel de administración web
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    networks:
      - backend-network

networks:
  backend-network:
    driver: bridge